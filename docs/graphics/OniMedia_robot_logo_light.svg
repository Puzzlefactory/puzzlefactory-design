<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 160" width="440" height="160">
  <defs>
    <linearGradient id="goldFace" x1="18%" y1="0%" x2="82%" y2="100%">
      <stop offset="0%" stop-color="#F2CC44"/>
      <stop offset="45%" stop-color="#D4A520"/>
      <stop offset="100%" stop-color="#8A5E0C"/>
    </linearGradient>
    <linearGradient id="goldHorn" x1="25%" y1="0%" x2="75%" y2="100%">
      <stop offset="0%" stop-color="#EAC030"/>
      <stop offset="100%" stop-color="#7A5010"/>
    </linearGradient>
    <filter id="eyeGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="faceShadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- LEFT HORN -->
  <path d="M55,52 L55,42 L57,42 L57,32 L58,32 L62,18 L66,32 L67,32 L67,42 L69,42 L69,52 Z" fill="url(#goldHorn)" filter="url(#faceShadow)"/>
  <line x1="55" y1="42" x2="69" y2="42" stroke="#5A3A06" stroke-width="1" opacity="0.8"/>
  <line x1="57" y1="32" x2="67" y2="32" stroke="#5A3A06" stroke-width="1" opacity="0.8"/>

  <!-- RIGHT HORN -->
  <path d="M91,52 L91,42 L93,42 L93,32 L94,32 L98,18 L102,32 L103,32 L103,42 L105,42 L105,52 Z" fill="url(#goldHorn)" filter="url(#faceShadow)"/>
  <line x1="91" y1="42" x2="105" y2="42" stroke="#5A3A06" stroke-width="1" opacity="0.8"/>
  <line x1="93" y1="32" x2="103" y2="32" stroke="#5A3A06" stroke-width="1" opacity="0.8"/>

  <!-- Main faceplate -->
  <rect x="43" y="48" width="74" height="74" rx="5" fill="url(#goldFace)" filter="url(#faceShadow)"/>

  <!-- Mechanical brow ridges -->
  <rect x="50" y="62" width="24" height="5" rx="1" fill="#B88C14"/>
  <rect x="86" y="62" width="24" height="5" rx="1" fill="#B88C14"/>

  <!-- Panel lines -->
  <line x1="43" y1="63" x2="117" y2="63" stroke="#7A5010" stroke-width="0.8" opacity="0.45"/>
  <line x1="80" y1="48" x2="80" y2="122" stroke="#7A5010" stroke-width="1" opacity="0.35"/>

  <!-- Corner rivets -->
  <circle cx="49" cy="54" r="2.5" fill="#7A5010"/>
  <circle cx="111" cy="54" r="2.5" fill="#7A5010"/>
  <circle cx="49" cy="116" r="2.5" fill="#7A5010"/>
  <circle cx="111" cy="116" r="2.5" fill="#7A5010"/>

  <!-- Eye housings -->
  <rect x="50" y="67" width="24" height="13" rx="2" fill="#1A1006"/>
  <rect x="86" y="67" width="24" height="13" rx="2" fill="#1A1006"/>

  <!-- Eyes — glowing amber -->
  <rect x="52" y="69" width="20" height="9" rx="1" fill="#FF9500" filter="url(#eyeGlow)"/>
  <rect x="88" y="69" width="20" height="9" rx="1" fill="#FF9500" filter="url(#eyeGlow)"/>

  <!-- Scanlines -->
  <line x1="52" y1="73.5" x2="72" y2="73.5" stroke="#994400" stroke-width="0.8" opacity="0.55"/>
  <line x1="88" y1="73.5" x2="108" y2="73.5" stroke="#994400" stroke-width="0.8" opacity="0.55"/>

  <!-- Cheek panels -->
  <rect x="44" y="84" width="13" height="20" rx="2" fill="#B88C14" opacity="0.55"/>
  <rect x="103" y="84" width="13" height="20" rx="2" fill="#B88C14" opacity="0.55"/>

  <!-- Mouth grille housing -->
  <rect x="57" y="92" width="46" height="22" rx="3" fill="#1A1006"/>

  <!-- Grille bars -->
  <rect x="61" y="96"  width="38" height="2.5" rx="1" fill="#D4A520" opacity="0.9"/>
  <rect x="61" y="101" width="38" height="2.5" rx="1" fill="#D4A520" opacity="0.9"/>
  <rect x="61" y="106" width="38" height="2.5" rx="1" fill="#D4A520" opacity="0.9"/>
  <rect x="61" y="111" width="38" height="2.5" rx="1" fill="#D4A520" opacity="0.9"/>

  <!-- Chin bar -->
  <rect x="62" y="118" width="36" height="5" rx="2" fill="#B88C14" opacity="0.5"/>

  <!-- Divider -->
  <line x1="170" y1="34" x2="170" y2="126" stroke="#DDDDDD" stroke-width="1"/>

  <!-- ONI wordmark — dark for light backgrounds -->
  <text
    x="186"
    y="90"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="70"
    font-weight="900"
    fill="#1A1A1A"
    letter-spacing="-1">ONI</text>

  <!-- MEDIA wordmark -->
  <text
    x="190"
    y="125"
    font-family="Arial, 'Helvetica Neue', sans-serif"
    font-size="26"
    font-weight="300"
    fill="#D4A520"
    letter-spacing="13">MEDIA</text>

</svg>
