<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 160" width="440" height="160">
  <defs>
    <radialGradient id="badgeBg" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#3D0808"/>
      <stop offset="100%" stop-color="#0E0303"/>
    </radialGradient>
    <radialGradient id="faceGrad" cx="40%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#F03535"/>
      <stop offset="100%" stop-color="#B81010"/>
    </radialGradient>
  </defs>

  <!-- Badge background -->
  <rect x="8" y="8" width="144" height="144" rx="22" fill="url(#badgeBg)"/>

  <!-- Subtle top highlight on badge -->
  <rect x="8" y="8" width="144" height="60" rx="22" fill="white" opacity="0.04"/>

  <!-- Left horn -->
  <polygon points="62,53 51,18 72,48" fill="#C01212"/>

  <!-- Right horn -->
  <polygon points="88,48 109,18 98,53" fill="#C01212"/>

  <!-- Oni face circle -->
  <circle cx="80" cy="84" r="37" fill="url(#faceGrad)"/>

  <!-- Eyebrows — fierce, furrowed inward -->
  <line x1="59" y1="65" x2="76" y2="71" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="84" y1="71" x2="101" y2="65" stroke="white" stroke-width="4" stroke-linecap="round"/>

  <!-- Eyes — white with dark pupils, slightly angled -->
  <ellipse cx="67" cy="78" rx="7.5" ry="5.5" fill="white" transform="rotate(-9,67,78)"/>
  <circle cx="67" cy="78" r="3" fill="#1A0505"/>
  <ellipse cx="93" cy="78" rx="7.5" ry="5.5" fill="white" transform="rotate(9,93,78)"/>
  <circle cx="93" cy="78" r="3" fill="#1A0505"/>

  <!-- Nose — subtle dots -->
  <circle cx="77" cy="89" r="2.5" fill="white" opacity="0.45"/>
  <circle cx="83" cy="89" r="2.5" fill="white" opacity="0.45"/>

  <!-- Mouth arc -->
  <path d="M64,98 Q80,110 96,98" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Fangs -->
  <polygon points="70,98 67,109 75,98" fill="white"/>
  <polygon points="85,98 90,98 87,109" fill="white"/>

  <!-- Divider -->
  <line x1="170" y1="34" x2="170" y2="126" stroke="#2E2E2E" stroke-width="1"/>

  <!-- ONI wordmark -->
  <text
    x="186"
    y="90"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="70"
    font-weight="900"
    fill="white"
    letter-spacing="-1">ONI</text>

  <!-- GAMES wordmark -->
  <text
    x="190"
    y="125"
    font-family="Arial, 'Helvetica Neue', sans-serif"
    font-size="26"
    font-weight="300"
    fill="#E82020"
    letter-spacing="13">GAMES</text>

</svg>
