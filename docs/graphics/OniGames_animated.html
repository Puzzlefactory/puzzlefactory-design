<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oni Games</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1A1A1A;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    #logo {
      width: min(880px, 95vw);
      scale: 0.25;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>

<svg id="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 160">
  <defs>
    <radialGradient id="badgeBg" cx="50%" cy="25%" r="72%">
      <stop offset="0%" stop-color="#200606"/>
      <stop offset="100%" stop-color="#060101"/>
    </radialGradient>
    <linearGradient id="redFace" x1="18%" y1="0%" x2="82%" y2="100%">
      <stop offset="0%" stop-color="#FF6666"/>
      <stop offset="45%" stop-color="#EE2828"/>
      <stop offset="100%" stop-color="#AA1010"/>
    </linearGradient>
    <linearGradient id="redHorn" x1="25%" y1="0%" x2="75%" y2="100%">
      <stop offset="0%" stop-color="#DD2222"/>
      <stop offset="100%" stop-color="#6A0808"/>
    </linearGradient>
    <filter id="eyeGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="mouthGlowFilter" x="-30%" y="-50%" width="160%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sparkGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Badge -->
  <rect x="8" y="8" width="144" height="144" rx="22" fill="url(#badgeBg)"/>

  <!-- Horn group (jolts during spark) -->
  <g id="hornGroup">
    <path d="M54,52 L54,40 L56,40 L57,30 L62,16 L67,30 L68,40 L70,40 L70,52 Z" fill="url(#redHorn)"/>
    <line x1="54" y1="40" x2="70" y2="40" stroke="#4A0606" stroke-width="1" opacity="0.9"/>
    <line x1="56" y1="30" x2="68" y2="30" stroke="#4A0606" stroke-width="1" opacity="0.9"/>
    <rect x="57" y="43" width="3" height="7" rx="1" fill="#EE4444" opacity="0.62"/>
    <rect x="57" y="32" width="3" height="6" rx="1" fill="#EE4444" opacity="0.62"/>

    <path d="M90,52 L90,40 L92,40 L93,30 L98,16 L103,30 L104,40 L106,40 L106,52 Z" fill="url(#redHorn)"/>
    <line x1="90" y1="40" x2="106" y2="40" stroke="#4A0606" stroke-width="1" opacity="0.9"/>
    <line x1="92" y1="30" x2="104" y2="30" stroke="#4A0606" stroke-width="1" opacity="0.9"/>
    <rect x="93" y="43" width="3" height="7" rx="1" fill="#EE4444" opacity="0.62"/>
    <rect x="93" y="32" width="3" height="6" rx="1" fill="#EE4444" opacity="0.62"/>
  </g>

  <!-- Faceplate -->
  <rect x="43" y="48" width="74" height="74" rx="5" fill="url(#redFace)"/>

  <!-- Panel lines -->
  <line x1="43" y1="62" x2="117" y2="62" stroke="#5A0A0A" stroke-width="0.8" opacity="0.5"/>
  <line x1="80" y1="48" x2="80" y2="122" stroke="#5A0A0A" stroke-width="1" opacity="0.35"/>

  <!-- Corner rivets -->
  <circle cx="49"  cy="54"  r="2.5" fill="#5A0A0A"/>
  <circle cx="111" cy="54"  r="2.5" fill="#5A0A0A"/>
  <circle cx="49"  cy="116" r="2.5" fill="#5A0A0A"/>
  <circle cx="111" cy="116" r="2.5" fill="#5A0A0A"/>

  <!-- Brow ridges -->
  <rect x="50" y="58" width="26" height="6" rx="1" fill="#8A0808"/>
  <rect x="84" y="58" width="26" height="6" rx="1" fill="#8A0808"/>

  <!-- LEFT EYE — static outer rings -->
  <circle cx="63" cy="76" r="12"   fill="#1A0404"/>
  <circle cx="63" cy="76" r="10.5" fill="#3A0606"/>
  <circle cx="63" cy="76" r="9"    fill="#0D0000"/>
  <circle cx="63" cy="76" r="7"    fill="#330000"/>
  <circle cx="63" cy="76" r="5.5"  fill="#550000"/>
  <!-- Left eye animated inner -->
  <circle id="lGlow"  cx="63" cy="76" r="4"   fill="#FF2200" filter="url(#eyeGlow)"/>
  <circle id="lPupil" cx="63" cy="76" r="1.8"  fill="#1A0000"/>
  <circle id="lHi1"   cx="59" cy="72" r="1.8"  fill="white" opacity="0.65"/>
  <circle id="lHi2"   cx="67" cy="80" r="0.9"  fill="white" opacity="0.28"/>

  <!-- RIGHT EYE — static outer rings -->
  <circle cx="97" cy="76" r="12"   fill="#1A0404"/>
  <circle cx="97" cy="76" r="10.5" fill="#3A0606"/>
  <circle cx="97" cy="76" r="9"    fill="#0D0000"/>
  <circle cx="97" cy="76" r="7"    fill="#330000"/>
  <circle cx="97" cy="76" r="5.5"  fill="#550000"/>
  <!-- Right eye animated inner -->
  <circle id="rGlow"  cx="97" cy="76" r="4"   fill="#FF2200" filter="url(#eyeGlow)"/>
  <circle id="rPupil" cx="97" cy="76" r="1.8"  fill="#1A0000"/>
  <circle id="rHi1"   cx="93" cy="72" r="1.8"  fill="white" opacity="0.65"/>
  <circle id="rHi2"   cx="101" cy="80" r="0.9" fill="white" opacity="0.28"/>

  <!-- Jagged mouth -->
  <path d="
    M54,96 L57,103 L60,96 L64,101 L68,96
    L72,105 L76,96 L79,102 L82,96
    L86,106 L90,96 L93,102 L96,96
    L100,104 L103,96 L106,96
    L106,118
    L103,111 L100,118 L97,112 L94,118
    L91,109 L88,118 L85,112 L82,118
    L79,110 L76,118 L73,111 L70,118
    L67,109 L64,118 L61,112 L58,118 L55,118 L54,118 Z
  " fill="#140000"/>
  <rect id="mouthGlowEl" x="62" y="104" width="36" height="8" rx="2"
        fill="#FF3300" opacity="0.28" filter="url(#mouthGlowFilter)"/>

  <!-- Cheek panels -->
  <rect x="44"  y="84" width="10" height="12" rx="2" fill="#8A0808" opacity="0.5"/>
  <rect x="106" y="84" width="10" height="12" rx="2" fill="#8A0808" opacity="0.5"/>

  <!-- Divider -->
  <line x1="170" y1="34" x2="170" y2="126" stroke="#2A2A2A" stroke-width="1"/>

  <!-- ONI wordmark -->
  <text x="186" y="90"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="70" font-weight="900"
    fill="white" stroke="black" stroke-width="4"
    stroke-linejoin="round" paint-order="stroke fill"
    letter-spacing="-1">ONI</text>

  <!-- GAMES wordmark -->
  <text x="190" y="125"
    font-family="Arial, 'Helvetica Neue', sans-serif"
    font-size="26" font-weight="300"
    fill="#E82020" letter-spacing="13">GAMES</text>

  <!-- Spark group — hidden until triggered -->
  <g id="sparkGroup" opacity="0">
    <path id="spark1" stroke="#38C8FF" stroke-width="1.8" stroke-linecap="round" fill="none" filter="url(#sparkGlow)"/>
    <path id="spark2" stroke="#A0EEFF" stroke-width="0.7" stroke-linecap="round" fill="none"/>
  </g>
</svg>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
  const R    = Math.random.bind(Math);
  const rand = (a, b) => a + R() * (b - a);

  const LX = 62, LY = 17, RX = 98, RY = 17;

  function makeLightning(x1, y1, x2, y2, segs) {
    const pts = [[x1, y1]];
    for (let i = 1; i < segs; i++) {
      const t = i / segs;
      pts.push([
        x1 + (x2 - x1) * t + rand(-3.5, 3.5),
        y1 + (y2 - y1) * t - Math.sin(Math.PI * t) * 9 + rand(-2, 2)
      ]);
    }
    pts.push([x2, y2]);
    return 'M' + pts.map(p => `${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' L');
  }

  const sparkGroup = document.getElementById('sparkGroup');
  const spark1     = document.getElementById('spark1');
  const spark2     = document.getElementById('spark2');


  // ── SPARK ──────────────────────────────────────────────
  function triggerSpark() {
    let count = 0;
    const total = 4 + Math.floor(rand(0, 5));

    function flash() {
      if (count >= total) {
        gsap.to(sparkGroup, { opacity: 0, duration: 0.07 });
        return;
      }
      spark1.setAttribute('d', makeLightning(LX, LY, RX, RY, 7));
      spark2.setAttribute('d', makeLightning(LX, LY, RX, RY, 6));
      gsap.set(sparkGroup, { opacity: 1 });
      count++;
      setTimeout(flash, 30 + rand(0, 60));
    }

    gsap.to('#hornGroup', {
      y: -2, duration: 0.04, yoyo: true, repeat: 5,
      ease: 'none', clearProps: 'transform'
    });

    flash();
  }

  // ── FLICKER ────────────────────────────────────────────
  function triggerFlicker() {
    const steps = 3 + Math.floor(rand(0, 5));
    let tl = gsap.timeline();
    for (let i = 0; i < steps; i++) {
      tl.to(['#lGlow', '#rGlow'], {
        opacity: R() > 0.4 ? 1 : 0.05,
        duration: 0.04 + rand(0, 0.08),
        ease: 'none'
      });
    }
    tl.to(['#lGlow', '#rGlow'], { opacity: 1, duration: 0.1 });
  }

  // ── SCAN — animates cx directly to avoid CSS transform conflicts ──
  const eyeData = [
    { id: 'lGlow',  cx: 63  },
    { id: 'lPupil', cx: 63  },
    { id: 'lHi1',   cx: 59  },
    { id: 'lHi2',   cx: 67  },
    { id: 'rGlow',  cx: 97  },
    { id: 'rPupil', cx: 97  },
    { id: 'rHi1',   cx: 93  },
    { id: 'rHi2',   cx: 101 },
  ];

  function triggerScan() {
    const dir   = R() > 0.5 ? 1 : -1;
    const shift = rand(2.5, 4.5);
    const tl    = gsap.timeline();

    eyeData.forEach(({ id, cx }) =>
      tl.to(`#${id}`, { attr: { cx: cx + shift * dir }, duration: 0.22, ease: 'power2.inOut' }, 0)
    );
    tl.to({}, { duration: rand(0.08, 0.45) });
    eyeData.forEach(({ id, cx }) =>
      tl.to(`#${id}`, { attr: { cx }, duration: 0.28, ease: 'power2.inOut' }, '<')
    );
  }

  // ── BLINK ──────────────────────────────────────────────
  function triggerBlink() {
    gsap.timeline()
      .to(['#lGlow', '#rGlow', '#lPupil', '#rPupil'], {
        opacity: 0, duration: 0.07, ease: 'power2.in'
      })
      .to(['#lGlow', '#rGlow', '#lPupil', '#rPupil'], {
        opacity: 1, duration: 0.14, ease: 'power2.out', delay: 0.05
      });
  }

  // ── RANDOM SCHEDULER ───────────────────────────────────
  function scheduleNext() {
    gsap.delayedCall(rand(3, 9), () => {
      const roll = R();
      if      (roll < 0.25) triggerSpark();
      else if (roll < 0.55) triggerBlink();
      else if (roll < 0.78) triggerScan();
      else                  triggerFlicker();
      scheduleNext();
    });
  }

  // ── ENTRY ──────────────────────────────────────────────
  gsap.set(['#lGlow', '#rGlow'], { opacity: 0 });
  gsap.to(['#lGlow', '#rGlow'], {
    opacity: 1, duration: 0.3, stagger: 0.1, delay: 0.4
  });

  gsap.delayedCall(2, scheduleNext);
</script>
</body>
</html>
