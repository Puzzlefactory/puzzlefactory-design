<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 160" width="540" height="160">
  <defs>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF8C3A"/>
      <stop offset="100%" stop-color="#E05B00"/>
    </linearGradient>
    <linearGradient id="tabGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F0F0"/>
    </linearGradient>
  </defs>

  <!-- Badge background -->
  <rect x="8" y="8" width="144" height="144" rx="22" fill="url(#badgeGrad)"/>

  <!-- Subtle inner highlight on badge -->
  <rect x="8" y="8" width="144" height="72" rx="22" fill="white" opacity="0.06"/>

  <!-- Left smokestack -->
  <rect x="50" y="22" width="21" height="46" rx="5" fill="white"/>

  <!-- Right smokestack -->
  <rect x="89" y="22" width="21" height="46" rx="5" fill="white"/>

  <!-- Factory building body -->
  <rect x="37" y="62" width="86" height="55" rx="4" fill="white"/>

  <!-- Puzzle tab — left side of building -->
  <circle cx="23" cy="89" r="13" fill="url(#tabGrad)"/>

  <!-- Puzzle tab — bottom of building -->
  <circle cx="80" cy="130" r="13" fill="url(#tabGrad)"/>

  <!-- Windows: orange cutouts in building -->
  <rect x="45" y="71" width="16" height="16" rx="3" fill="#E05B00"/>
  <rect x="72" y="71" width="16" height="16" rx="3" fill="#E05B00"/>
  <rect x="99" y="71" width="16" height="16" rx="3" fill="#E05B00"/>

  <!-- Door: orange, anchored to building floor -->
  <rect x="72" y="91" width="16" height="26" rx="3" fill="#E05B00"/>

  <!-- Smoke puffs above stacks -->
  <circle cx="60" cy="15" r="5" fill="white" opacity="0.38"/>
  <circle cx="100" cy="15" r="5" fill="white" opacity="0.38"/>

  <!-- Divider line -->
  <line x1="170" y1="34" x2="170" y2="126" stroke="#DDDDDD" stroke-width="1"/>

  <!-- PUZZLE wordmark -->
  <text
    x="186"
    y="87"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="56"
    font-weight="900"
    fill="#1A1A2E"
    letter-spacing="0">PUZZLE</text>

  <!-- FACTORY wordmark -->
  <text
    x="189"
    y="122"
    font-family="Arial, 'Helvetica Neue', sans-serif"
    font-size="27"
    font-weight="400"
    fill="#E05B00"
    letter-spacing="13">FACTORY</text>

</svg>
