<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 160" width="440" height="160">
  <defs>
    <radialGradient id="badgeBg" cx="50%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#0E2248"/>
      <stop offset="100%" stop-color="#060C1A"/>
    </radialGradient>
  </defs>

  <!-- Badge background -->
  <rect x="8" y="8" width="144" height="144" rx="22" fill="url(#badgeBg)"/>
  <rect x="8" y="8" width="144" height="56" rx="22" fill="white" opacity="0.03"/>

  <!-- Hair (behind everything) -->
  <ellipse cx="80" cy="70" rx="38" ry="44" fill="#1A4A9A"/>

  <!-- Hair highlight -->
  <path d="M50,50 Q80,40 110,50" stroke="#3A6FBF" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round"/>

  <!-- Left horn — triangular, light blue, grows from hair -->
  <path d="M60,60 L67,28 L74,60 Z" fill="#7EC8E3"/>

  <!-- Right horn — mirrored -->
  <path d="M86,60 L93,28 L100,60 Z" fill="#7EC8E3"/>

  <!-- Face -->
  <ellipse cx="80" cy="88" rx="31" ry="30" fill="#D8EEFF"/>

  <!-- Eyebrows — soft arched -->
  <path d="M64,76 Q70,72 77,75" stroke="#5A8BBF" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M83,75 Q90,72 96,76" stroke="#5A8BBF" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Left eye -->
  <circle cx="70" cy="84" r="7" fill="white"/>
  <circle cx="70" cy="84" r="4.5" fill="#1A4A9A"/>
  <circle cx="70" cy="84" r="2.5" fill="#060C1A"/>
  <circle cx="68" cy="82" r="1.5" fill="white"/>

  <!-- Right eye -->
  <circle cx="90" cy="84" r="7" fill="white"/>
  <circle cx="90" cy="84" r="4.5" fill="#1A4A9A"/>
  <circle cx="90" cy="84" r="2.5" fill="#060C1A"/>
  <circle cx="88" cy="82" r="1.5" fill="white"/>

  <!-- Blush -->
  <ellipse cx="59" cy="93" rx="8" ry="5" fill="#FFB3C6" opacity="0.42"/>
  <ellipse cx="101" cy="93" rx="8" ry="5" fill="#FFB3C6" opacity="0.42"/>

  <!-- Smile -->
  <path d="M71,101 Q80,109 89,101" stroke="#5A8BBF" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Cute fang -->
  <polygon points="76,101 73,109 80,101" fill="#D8EEFF" stroke="#5A8BBF" stroke-width="0.8"/>

  <!-- Divider -->
  <line x1="170" y1="34" x2="170" y2="126" stroke="#1A2A4A" stroke-width="1"/>

  <!-- ONI wordmark -->
  <text
    x="186"
    y="90"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="70"
    font-weight="900"
    fill="white"
    letter-spacing="-1">ONI</text>

  <!-- MEDIA wordmark -->
  <text
    x="190"
    y="125"
    font-family="Arial, 'Helvetica Neue', sans-serif"
    font-size="26"
    font-weight="300"
    fill="#4A9EFF"
    letter-spacing="13">MEDIA</text>

</svg>
